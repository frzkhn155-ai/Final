name: Upstox Trading Bot

# ───────────────────────────────────────────────────────────────────────────────
# TRIGGERS
# • Schedule : runs automatically at 09:10 IST (03:40 UTC) on weekdays
# • Manual   : Actions tab → "Upstox Trading Bot" → "Run workflow"
# ───────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    # 03:40 UTC = 09:10 IST (5 min before NSE market open) — Mon–Fri only
    - cron: '40 3 * * 1-5'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual trigger'

env:
  # Opt into Node.js 24 now — GitHub forces it on June 2, 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    name: Run Trading Bot
    runs-on: ubuntu-latest
    timeout-minutes: 390          # 6.5 hours — covers full market session + buffer

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install system dependencies ────────────────────────────────────
      # xclip/xdotool: required by pyperclip (imported in the trading script).
      # Without this, pyperclip raises an exception on headless Linux and the
      # bot crashes within ~40 seconds with no log files produced.
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xclip xdotool

      # ── 4. Install Google Chrome (modern, non-deprecated method) ──────────
      # ROOT CAUSE FIX: ubuntu-latest is now Ubuntu 24.04, which removed the
      # old `apt-key` command used in the previously working workflow.
      # The old method silently failed → Chrome was not installed → Selenium
      # crashed the bot at startup (exit code 1, ~40s runtime, no log files).
      - name: Install Google Chrome
        run: |
          sudo install -m 0755 -d /etc/apt/keyrings
          wget -qO- https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /etc/apt/keyrings/google-chrome.gpg
          sudo chmod a+r /etc/apt/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list > /dev/null
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 5. Install Python dependencies ────────────────────────────────────
      # NOTE: requirements.txt was corrupted — selenium + webdriver-manager
      # were listed 17 times each. This has been fixed in the cleaned file.
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── 6. Restore cached candle data (speeds up re-runs) ─────────────────
      - name: Restore candle cache
        uses: actions/cache@v4
        with:
          path: candle_cache/
          key: candle-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            candle-cache-${{ runner.os }}-

      # ── 7. Restore saved Upstox token ─────────────────────────────────────
      # GitHub Actions cache entries expire after 7 days of no access.
      # If the bot fails again with a short runtime after this fix:
      #   1. Log into Upstox → complete OAuth in your browser
      #   2. Copy the access_token
      #   3. Repo → Settings → Secrets → Actions → update UPSTOX_TOKEN
      - name: Restore Upstox token
        uses: actions/cache@v4
        with:
          path: |
            upstox_token.txt
            upstox_refresh_token.txt
            token_timestamp.json
          key: upstox-token-${{ runner.os }}
          restore-keys: |
            upstox-token-${{ runner.os }}

      # ── 8. Pre-flight: validate token secret ──────────────────────────────
      - name: Validate Upstox token secret
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
        run: |
          if [ -z "$UPSTOX_TOKEN" ]; then
            echo "⚠️  WARNING: UPSTOX_TOKEN secret is empty."
            echo "   The bot will fall back to Selenium OAuth login."
            echo "   If that also fails, refresh the token and update the secret."
          else
            echo "✅ UPSTOX_TOKEN is set (length: ${#UPSTOX_TOKEN} chars)"
          fi

      # ── 9. Run the bot ────────────────────────────────────────────────────
      - name: Run trading bot
        env:
          UPSTOX_EMAIL:      ${{ secrets.UPSTOX_EMAIL }}
          UPSTOX_PASSWORD:   ${{ secrets.UPSTOX_PASSWORD }}
          UPSTOX_MOBILE:     ${{ secrets.UPSTOX_MOBILE }}
          UPSTOX_PASSCODE:   ${{ secrets.UPSTOX_PASSCODE }}
          UPSTOX_API_KEY:    ${{ secrets.UPSTOX_API_KEY }}
          UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
          UPSTOX_TOKEN:      ${{ secrets.UPSTOX_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN:          ${{ secrets.GH_PAT }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2

          # ── Early token sync (background) ──────────────────────────────────
          # Polls upstox_token.txt every 15 s for up to 10 min.
          # As soon as the bot writes a fresh OAuth token, pushes it to
          # Final-ORB-Only and upstox-bot so those bots (starting 7–14 min
          # later) can use it directly without running Selenium OAuth themselves.
          (
            LAST=""
            for i in $(seq 1 40); do
              sleep 15
              if [ -s upstox_token.txt ]; then
                CURRENT=$(cat upstox_token.txt | tr -d '[:space:]')
                if [ ${#CURRENT} -gt 450 ] && [ "$CURRENT" != "$LAST" ]; then
                  LAST="$CURRENT"
                  echo "[early-sync] New token detected (len=${#CURRENT}), pushing to all repos..."
                  gh secret set UPSTOX_TOKEN --body "$CURRENT" --repo frzkhn155-ai/Final          2>&1 | sed 's/^/[early-sync] /'
                  gh secret set UPSTOX_TOKEN --body "$CURRENT" --repo frzkhn155-ai/Final-ORB-Only 2>&1 | sed 's/^/[early-sync] /'
                  gh secret set UPSTOX_TOKEN --body "$CURRENT" --repo frzkhn155-ai/upstox-bot     2>&1 | sed 's/^/[early-sync] /'
                  echo "[early-sync] ✅ UPSTOX_TOKEN synced to all 3 repos at $(TZ='Asia/Kolkata' date '+%H:%M:%S') IST"
                fi
              fi
            done
          ) &
          SYNC_PID=$!

          # ── Run the bot ────────────────────────────────────────────────────
          python - <<'PYEOF'
          import traceback, sys, runpy
          try:
              runpy.run_path("Both4withcache10_headless.py", run_name="__main__")
          except SystemExit as e:
              sys.exit(e.code)
          except Exception:
              tb = traceback.format_exc()
              print("❌ UNHANDLED EXCEPTION:\n" + tb, file=sys.stderr)
              with open("crash_log.txt", "w") as f:
                  f.write(tb)
              sys.exit(1)
          PYEOF

          kill $SYNC_PID 2>/dev/null || true

      # ── 10. Sync token to all repos (end-of-day safety net) ──────────────
      # Belt-and-suspenders: the early-sync background loop above handles the
      # morning sync within minutes of token acquisition. This step is a
      # safety net that ensures the token is synced even if the early loop
      # somehow missed it (e.g. token was read from cache, not written fresh).
      - name: Sync token to all repos
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️  GH_PAT not set — skipping cross-repo token sync."
            exit 0
          fi
          TOKEN_VALUE=""
          if [ -f upstox_token.txt ]; then
            TOKEN_VALUE=$(cat upstox_token.txt | tr -d '[:space:]')
          fi
          if [ -z "$TOKEN_VALUE" ]; then
            echo "⚠️  upstox_token.txt is empty — nothing to sync."
            exit 0
          fi
          echo "✅ End-of-day sync: token (len=${#TOKEN_VALUE}) → all 3 repos"
          gh secret set UPSTOX_TOKEN --body "$TOKEN_VALUE" --repo frzkhn155-ai/Final
          gh secret set UPSTOX_TOKEN --body "$TOKEN_VALUE" --repo frzkhn155-ai/Final-ORB-Only
          gh secret set UPSTOX_TOKEN --body "$TOKEN_VALUE" --repo frzkhn155-ai/upstox-bot
          echo "✅ UPSTOX_TOKEN updated in all repositories."

      # ── 12. Save updated token for next run ───────────────────────────────
      - name: Save Upstox token (post-run)
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            upstox_token.txt
            upstox_refresh_token.txt
            token_timestamp.json
          key: upstox-token-${{ runner.os }}

      # ── 13. Upload all log / CSV files as artifacts ───────────────────────
      - name: Upload trading logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            crash_log.txt
            r3_live_alerts.txt
            r3_live_alerts.csv
            gap_trading_alerts.txt
            gap_trading_alerts.csv
            box_trading_alerts.txt
            box_trading_alerts.csv
            range_trading_alerts.txt
            range_trading_alerts.csv
            exits_log.txt
            exits_log.csv
            positions_tracking.csv
            fast_trades_entries.csv
            fast_trades_exits.csv
            orb_signals.csv
            orb_trades.csv
            orb_trading_log.txt
            cache_stats.json
