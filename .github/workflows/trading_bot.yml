name: Upstox Trading Bot

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual trigger'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run-bot:
    name: Run Trading Bot
    runs-on: ubuntu-latest
    timeout-minutes: 390

    steps:
      # ── 0. MARKET PRE-CHECK — gates every step below ──────────────────────
      # A precheck step that just exits 0 does NOT stop later steps from
      # running — GitHub Actions executes every step regardless unless an
      # explicit `if:` condition reads a job output. This step sets that
      # output; every later step checks steps.precheck.outputs.should_run.
      - name: Market pre-check
        id: precheck
        env:
          TZ: Asia/Kolkata
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
        run: |
          set +e   # never let this step itself fail the job

          NOW_DOW=$(date +%u)      # 1=Mon ... 6=Sat 7=Sun
          NOW_HM=$(date +%H:%M)
          NOW_FULL=$(date '+%Y-%m-%d %H:%M:%S %Z')

          echo "🕐 Current time (IST): $NOW_FULL"

          SHOULD_RUN=true
          REASON=""

          # ── 1. Weekend skip ──────────────────────────────────────────────
          if [ "$NOW_DOW" -ge 6 ]; then
            SHOULD_RUN=false
            REASON="Weekend (day-of-week=$NOW_DOW) — market closed"
          fi

          # ── 2. Time window: 09:00–15:40 IST ──────────────────────────────
          if [ "$SHOULD_RUN" = "true" ]; then
            if [[ "$NOW_HM" < "09:00" || "$NOW_HM" > "15:40" ]]; then
              SHOULD_RUN=false
              REASON="Outside trading window 09:00-15:40 IST (now $NOW_HM)"
            fi
          fi

          # ── 3. Upstox holiday/market-status check ────────────────────────
          # Best-effort only: if the token is stale/missing or the API call
          # fails, we do NOT block the run on this check (fail-open) — the
          # weekday + time window gates above are the primary safety net.
          if [ "$SHOULD_RUN" = "true" ] && [ -n "$UPSTOX_TOKEN" ]; then
            RESP=$(curl -s -m 10 -H "Authorization: Bearer $UPSTOX_TOKEN" \
                   -H "Accept: application/json" \
                   "https://api.upstox.com/v2/market/status/NSE")
            STATUS=$(echo "$RESP" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d.get('data',{}).get('status','UNKNOWN'))" 2>/dev/null)
            [ -z "$STATUS" ] && STATUS="UNKNOWN"
            echo "📡 Upstox market status API → $STATUS"
            if [ "$STATUS" = "CLOSED" ]; then
              SHOULD_RUN=false
              REASON="Upstox reports market CLOSED (holiday or after-hours)"
            fi
          else
            echo "ℹ️  Skipping Upstox holiday API check (no token yet / will OAuth fresh)"
          fi

          # ── Output result ─────────────────────────────────────────────────
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          if [ "$SHOULD_RUN" = "true" ]; then
            echo -e "\033[1;32m✅ PRE-CHECK PASSED — proceeding with trading run\033[0m"
          else
            echo -e "\033[1;31m⛔ PRE-CHECK FAILED — $REASON\033[0m"
            echo -e "\033[1;33m⚠️  All remaining steps will be skipped.\033[0m"
          fi

      - name: Checkout repository
        if: steps.precheck.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.11
        if: steps.precheck.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        if: steps.precheck.outputs.should_run == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xclip xdotool

      - name: Install Google Chrome
        if: steps.precheck.outputs.should_run == 'true'
        run: |
          sudo install -m 0755 -d /etc/apt/keyrings
          wget -qO- https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /etc/apt/keyrings/google-chrome.gpg
          sudo chmod a+r /etc/apt/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list > /dev/null
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install Python packages
        if: steps.precheck.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Restore candle cache
        if: steps.precheck.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: candle_cache/
          key: candle-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            candle-cache-${{ runner.os }}-

      - name: Restore Upstox token
        if: steps.precheck.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            upstox_token.txt
            upstox_refresh_token.txt
            token_timestamp.json
          key: upstox-token-${{ runner.os }}
          restore-keys: |
            upstox-token-${{ runner.os }}

      - name: Validate Upstox token secret
        if: steps.precheck.outputs.should_run == 'true'
        env:
          UPSTOX_TOKEN: ${{ secrets.UPSTOX_TOKEN }}
        run: |
          if [ -z "$UPSTOX_TOKEN" ]; then
            echo "⚠️  WARNING: UPSTOX_TOKEN secret is empty."
            echo "   The bot will fall back to Selenium OAuth login."
          else
            echo "✅ UPSTOX_TOKEN is set (length: ${#UPSTOX_TOKEN} chars)"
          fi

      - name: Run trading bot
        if: steps.precheck.outputs.should_run == 'true'
        env:
          UPSTOX_EMAIL:      ${{ secrets.UPSTOX_EMAIL }}
          UPSTOX_PASSWORD:   ${{ secrets.UPSTOX_PASSWORD }}
          UPSTOX_MOBILE:     ${{ secrets.UPSTOX_MOBILE }}
          UPSTOX_PASSCODE:   ${{ secrets.UPSTOX_PASSCODE }}
          UPSTOX_API_KEY:    ${{ secrets.UPSTOX_API_KEY }}
          UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
          UPSTOX_TOKEN:      ${{ secrets.UPSTOX_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN:          ${{ secrets.GH_PAT }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python - <<'PYEOF'
          import traceback, sys, runpy
          try:
              runpy.run_path("Both4withcache10_headless.py", run_name="__main__")
          except SystemExit as e:
              sys.exit(e.code)
          except Exception:
              tb = traceback.format_exc()
              print("❌ UNHANDLED EXCEPTION:\n" + tb, file=sys.stderr)
              with open("crash_log.txt", "w") as f:
                  f.write(tb)
              sys.exit(1)
          PYEOF

      - name: Commit trading logs to repo
        if: always() && steps.precheck.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in orb_signals.csv orb_trades.csv orb_trading_log.txt r3_live_alerts.csv r3_live_alerts.txt gap_trading_alerts.csv gap_trading_alerts.txt box_trading_alerts.csv box_trading_alerts.txt range_trading_alerts.csv range_trading_alerts.txt exits_log.csv exits_log.txt positions_tracking.csv fast_trades_entries.csv fast_trades_exits.csv fii_dii_cache.json fii_dii_trend_cache.json crash_log.txt; do
            [ -f "$f" ] && git add -f "$f"
          done
          git add -f FII_DII_*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "ℹ️  No log files changed — skipping commit."
          else
            git commit -m "logs: trading session $(date +'%Y-%m-%d') [run ${{ github.run_id }}]"
            git push
            echo "✅ Logs committed and pushed."
          fi

      - name: Sync token to all repos
        if: always() && steps.precheck.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️  GH_PAT not set — skipping cross-repo token sync."
            exit 0
          fi
          TOKEN_VALUE=""
          if [ -f upstox_token.txt ]; then
            TOKEN_VALUE=$(cat upstox_token.txt | tr -d '[:space:]')
          fi
          if [ -z "$TOKEN_VALUE" ]; then
            echo "⚠️  upstox_token.txt is empty — nothing to sync."
            exit 0
          fi
          echo "✅ Syncing token"
          gh secret set UPSTOX_TOKEN --body "$TOKEN_VALUE" --repo frzkhn155-ai/Final
          gh secret set UPSTOX_TOKEN --body "$TOKEN_VALUE" --repo frzkhn155-ai/Final-ORB-Only
          echo "✅ Synced"

      - name: Save Upstox token (post-run)
        if: always() && steps.precheck.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            upstox_token.txt
            upstox_refresh_token.txt
            token_timestamp.json
          key: upstox-token-${{ runner.os }}

      - name: Upload trading logs
        if: always() && steps.precheck.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            *.csv
            *.txt
            crash_log.txt
            FII_DII_*.csv

      - name: Run summary
        if: always()
        run: |
          if [ "${{ steps.precheck.outputs.should_run }}" = "true" ]; then
            echo "✅ Pre-check passed — trading bot ran this session."
          else
            echo "⛔ Pre-check SKIPPED this run."
            echo "   Reason: ${{ steps.precheck.outputs.reason }}"
          fi
