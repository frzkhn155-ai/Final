name: Run Trading Bot

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Trading strategy to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - r3_s3
          - box
          - range
          - gap
          - orb
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trading Bot
        env:
          UPSTOX_API_KEY: ${{ secrets.UPSTOX_API_KEY }}
          UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
          UPSTOX_REDIRECT_URI: ${{ secrets.UPSTOX_REDIRECT_URI }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          STRATEGY: ${{ github.event.inputs.strategy }}
          DEBUG_MODE: ${{ github.event.inputs.debug_mode }}
        run: |
          echo "Starting trading bot..."
          echo "Strategy: $STRATEGY"
          echo "Debug Mode: $DEBUG_MODE"
          python Both4withcache10_headless_patched.py

      - name: Upload logs (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: |
            *.log
            *.txt
          retention-days: 7
