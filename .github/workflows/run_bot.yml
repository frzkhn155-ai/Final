name: Run Trading Bot (Manual)

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Trading strategy to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - r3_s3
          - box
          - range
          - gap
          - orb
          - reversal
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 390

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xclip xdotool

      - name: Install Google Chrome
        run: |
          sudo install -m 0755 -d /etc/apt/keyrings
          wget -qO- https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /etc/apt/keyrings/google-chrome.gpg
          sudo chmod a+r /etc/apt/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list > /dev/null
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install Python packages
        run: pip install -r requirements.txt

      # Similar for other steps, abbreviated
      - name: Run Trading Bot
        env:
          # secrets...
        run: |
          # bot run

      - name: Sync token
        # etc
